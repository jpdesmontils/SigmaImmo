<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fiche marchand de biens</title><style>body{margin:0;background:#f5f3ee;color:#16150f;font:14px Inter,Arial,sans-serif}.sheet{max-width:960px;margin:auto;padding:30px}h1{margin:0 0 6px}h2{font-size:16px;border-bottom:1px solid #d0ccc3;padding-bottom:8px;margin-top:28px}.muted{color:#5a5850}.pill{display:inline-block;padding:6px 10px;border-radius:4px;background:#faefd5;color:#7a4108;font-weight:bold}.go{background:#d6f0df;color:#145a2e}.no_go{background:#fce8e8;color:#831515}table{width:100%;border-collapse:collapse;background:white}th,td{padding:9px;border:1px solid #d0ccc3;text-align:right}th:first-child,td:first-child{text-align:left}ul{line-height:1.6}.risk{background:#fff;border-left:4px solid #e0a84a;padding:10px;margin:8px 0}.error{color:#831515}</style></head><body><main class="sheet" id="app">Chargement de l'analyse…</main><script>(()=>{const q=new URLSearchParams(location.search),id=q.get('id');function eur(x){return typeof x==='number'?x.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):'—'}function esc(x){return String(x??'—').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}fetch('https://solenis-studio.fr/sigma-immo/api/analysis.php?id='+encodeURIComponent(id)+'&type=mdb').then(r=>r.json()).then(({analysis:a})=>{if(!a)throw Error();let s=a.executive_summary||{},b=(a.bilan_promoteur||{}).scenarios||[];document.title='Fiche MDB — '+(a.annonce_id||'');document.querySelector('#app').innerHTML=`<span class="pill ${esc(s.decision)}">${esc(s.decision||'à confirmer').replace('_',' ').toUpperCase()}</span><h1>Fiche marchand de biens</h1><p class="muted">Analyse du ${esc(a.date_analyse)} · annonce ${esc(a.annonce_id)}</p><h2>Décision</h2><p>${esc(s.synthese)}</p><table><tr><th>Marge base</th><th>Prix demandé</th><th>PMA</th><th>Écart</th></tr><tr><td>${eur(s.marge_nette_base_eur)} (${esc(s.marge_nette_base_pct)} %)</td><td>${eur(s.prix_demande_eur)}</td><td>${eur(s.prix_max_acquisition_eur)}</td><td>${eur(s.ecart_prix_demande_pma_eur)}</td></tr></table><h2>Bilan promoteur</h2><table><tr><th>Scénario</th><th>VSB</th><th>Coût total</th><th>Marge nette</th><th>PMA</th></tr>${b.map(x=>`<tr><td>${esc(x.nom)}</td><td>${eur(x.valeur_sortie_brute_eur)}</td><td>${eur(x.cout_total_eur)}</td><td>${eur(x.marge_nette_eur)} (${esc(x.marge_nette_pct)} %)</td><td>${eur(x.prix_max_acquisition_eur)}</td></tr>`).join('')}</table><h2>Réglementation</h2><p><b>PLU :</b> ${esc((a.reglementation||{}).plu)}<br><b>Permis :</b> ${esc((a.reglementation||{}).permis)}</p><h2>Planning</h2><p>${esc((a.planning||{}).duree_totale_mois)} mois · portage ${eur((a.planning||{}).cout_portage_eur)}</p><h2>Risques</h2>${(a.risques||[]).map(r=>`<div class="risk"><b>${esc(r.criticite)} — ${esc(r.titre)}</b><br>Impact : ${eur(r.impact_marge_eur)} · ${esc(r.action)}</div>`).join('')}<h2>Sources</h2><ul>${(a.sources||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}).catch(()=>document.querySelector('#app').innerHTML='<p class="error">Analyse indisponible.</p>');})();</script></body></html>
