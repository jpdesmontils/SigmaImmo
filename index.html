<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImmoAggregator — Ma galerie</title>

  <!-- Leaflet pour la carte -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

  <style>
    /* ── Reset & tokens ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #2563eb;
      --accent-h:   #1d4ed8;
      --gold:       #f59e0b;
      --green:      #10b981;
      --fav-tag:    #2563eb;
      --radius:     10px;
      --font:       'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── Dark mode (défaut) ──────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:       #0b0f1a;
      --surface:  #111827;
      --surface2: #1e2535;
      --border:   #1f2d40;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --shadow:   0 4px 24px rgba(0,0,0,.5);
      --header-bg: rgba(11,15,26,.92);
    }

    /* ── Light mode ──────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:       #f1f5f9;
      --surface:  #ffffff;
      --surface2: #e2e8f0;
      --border:   #cbd5e1;
      --text:     #0f172a;
      --muted:    #64748b;
      --shadow:   0 4px 24px rgba(0,0,0,.1);
      --header-bg: rgba(241,245,249,.92);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
    }

    .header-logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: #fff;
      white-space: nowrap;
    }
    .header-logo span { color: var(--accent); }

    .header-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .header-stats b { color: var(--text); }

    .spacer { flex: 1; }

    /* ── Vue switcher ────────────────────────────────────────── */
    .view-switcher {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all .15s;
      line-height: 1;
    }
    .view-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .view-btn:hover:not(.active) { color: var(--text); }

    /* ── Sidebar filtres ──────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
    }

    .sidebar h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .filter-group { margin-bottom: 20px; }

    .filter-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .filter-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
    }
    .filter-input:focus { outline: none; border-color: var(--accent); }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .selection-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .selection-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .selection-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .sort-select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
    }

    .btn-reset {
      width: 100%;
      padding: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      margin-top: 4px;
    }
    .btn-reset:hover { border-color: var(--text); color: var(--text); }

    /* ── Main content ────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 20px;
      overflow: hidden;
    }

    .result-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .result-bar b { color: var(--text); }

    /* ── Vue Galerie ─────────────────────────────────────────── */
    #view-gallery { display: none; }
    #view-gallery.active { display: block; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 16/10;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--muted);
    }

    .card-body { padding: 12px 14px 14px; }

    .card-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .tag-fav    { background: rgba(37,99,235,.2);  color: #60a5fa; }
    .tag-invest { background: rgba(245,158,11,.2); color: #fbbf24; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .card-price { color: var(--gold); font-weight: 700; font-size: 15px; }
    .card-location { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    /* Boutons uniformes sur les cartes */
    .card-btn-map, .card-btn-delete, .card-btn-tag {
      flex: 1;
      padding: 5px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      line-height: 1.4;
    }
    .card-btn-map:hover    { background: var(--accent);  color: #fff;    border-color: var(--accent); }
    .card-btn-delete:hover { background: #7f1d1d;        color: #fca5a5; border-color: #991b1b; }
    .card-btn-tag:hover    { background: var(--surface2); color: var(--text); }
    .tag-shortlist-active { background: rgba(16,185,129,.25) !important; color: #34d399 !important; border-color: #059669 !important; }
    .tag-ecartee-active   { background: rgba(239,68,68,.25)  !important; color: #f87171 !important; border-color: #dc2626 !important; }
    .tag-invest-active    { background: rgba(245,158,11,.25) !important; color: #fbbf24 !important; border-color: #b45309 !important; }

    /* ── Badge sélection sur vignette ─────────────────────────── */
    .card { position: relative; overflow: hidden; }
    .card-selection-badge {
      position: absolute;
      top: 10px; left: -28px;
      width: 110px;
      padding: 4px 0;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      transform: rotate(-45deg);
      z-index: 10;
      letter-spacing: .5px;
    }
    .badge-shortlist { background: #059669; color: #fff; }
    .badge-ecartee   { background: #dc2626; color: #fff; }
    .badge-invest    { background: #b45309; color: #fff; }

    /* ── Modale suppression ──────────────────────────────────── */
    .delete-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .delete-modal.open { display: flex; }

    .delete-modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .delete-modal-box h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .delete-modal-box p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .delete-modal-name {
      color: var(--text);
      font-style: italic;
    }
    .delete-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-modal-cancel {
      padding: 8px 18px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-modal-cancel:hover { color: var(--text); border-color: var(--text); }
    .btn-modal-confirm {
      padding: 8px 18px;
      border-radius: 7px;
      border: none;
      background: #dc2626;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-modal-confirm:hover { background: #b91c1c; }

    /* ── Vue Liste ───────────────────────────────────────────── */
    #view-list { display: none; }
    #view-list.active { display: block; }

    .list-table {
      width: 100%;
      border-collapse: collapse;
    }
    .list-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .list-table th.sortable { cursor: pointer; }
    .list-table th.sortable:hover { color: var(--text); }
    .list-table td {
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .list-table tr:hover td { background: var(--surface2); }

    .list-thumb {
      width: 64px;
      height: 40px;
      object-fit: cover;
      border-radius: 5px;
      background: var(--surface2);
    }

    /* ── Vue Carte ───────────────────────────────────────────── */
    #view-map { display: none; }
    #view-map.active { display: block; }

    #map {
      height: calc(100vh - 56px - 40px - 52px);
      min-height: 400px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* ── Slideshow / Lightbox ────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(8px);
    }
    .lightbox.open { display: flex; flex-direction: column; }

    .lb-header {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      gap: 16px;
      background: rgba(0,0,0,.4);
    }
    .lb-title { flex: 1; font-size: 16px; font-weight: 600; }
    .lb-counter { font-size: 13px; color: var(--muted); }

    .lb-controls { display: flex; gap: 8px; }
    .lb-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .lb-btn:hover { background: var(--surface); }
    .lb-btn.active { background: var(--accent); border-color: var(--accent); }
    .lb-btn-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .lb-btn-close:hover { color: var(--text); }

    .lb-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .lb-img {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.6);
      border: none;
      color: white;
      font-size: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .lb-nav:hover { background: rgba(37,99,235,.8); }
    .lb-nav-prev { left: 16px; }
    .lb-nav-next { right: 16px; }

    .lb-info {
      padding: 16px 24px;
      background: rgba(0,0,0,.4);
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .lb-price { color: var(--gold); font-size: 20px; font-weight: 800; }
    .lb-detail { font-size: 13px; color: var(--muted); }
    .lb-link {
      margin-left: auto;
      padding: 8px 18px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .lb-link:hover { background: var(--accent-h); }

    .lb-progress {
      height: 3px;
      background: var(--border);
    }
    .lb-progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width .3s linear;
    }

    /* ── Loading / Empty ─────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* ── Responsive ──────────────────────────────────────────── */
    .btn-theme {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 7px;
      font-size: 16px;
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-theme:hover { color: var(--text); border-color: var(--text); }

    .btn-filters-mobile {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      .btn-theme {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 7px;
      font-size: 16px;
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-theme:hover { color: var(--text); border-color: var(--text); }

    .btn-filters-mobile { display: flex; }
      .sidebar {
        position: fixed;
        top: 56px;
        left: 0;
        bottom: 0;
        z-index: 201;
        transform: translateX(-100%);
        transition: transform .25s ease;
        height: calc(100vh - 56px);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
      }
      .sidebar.open { transform: translateX(0); }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="header">
  <div class="header-logo">Immo<span>Agg</span></div>
  <div class="header-stats">
    <span>⭐ <b id="hdr-fav">—</b> favoris</span>
  </div>
  <div class="spacer"></div>
  <button class="btn-filters-mobile" id="btn-filters-mobile">⚙ Filtres</button>
  <button class="btn-theme" id="btn-theme" title="Changer le thème">🌙</button>
  <div class="view-switcher">
    <button class="view-btn active" data-view="gallery" title="Galerie">⊞</button>
    <button class="view-btn" data-view="list" title="Liste">≡</button>
    <button class="view-btn" data-view="map" title="Carte">⊙</button>
  </div>
</header>

<!-- ── Layout ─────────────────────────────────────────────── -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="filter-group">
      <h3>Ville</h3>
      <input class="filter-input" id="f-city" type="text" placeholder="Ex: Paris, Lyon…">
    </div>

    <div class="filter-group">
      <h3>Prix (€)</h3>
      <div class="range-row">
        <input class="filter-input" id="f-price-min" type="number" placeholder="Min">
        <input class="filter-input" id="f-price-max" type="number" placeholder="Max">
      </div>
    </div>

    <div class="filter-group">
      <h3>Surface (m²)</h3>
      <div class="range-row">
        <input class="filter-input" id="f-surf-min" type="number" placeholder="Min">
        <input class="filter-input" id="f-surf-max" type="number" placeholder="Max">
      </div>
    </div>

    <div class="filter-group">
      <h3>Tri</h3>
      <select class="sort-select" id="f-sort">
        <option value="date_desc">Plus récent</option>
        <option value="date_asc">Plus ancien</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
        <option value="surface_desc">Surface décroissante</option>
        <option value="surface_asc">Surface croissante</option>
      </select>
    </div>

    <div class="filter-group">
      <h3>Sélection</h3>
      <div class="selection-btns">
        <button class="selection-btn active" data-selection="all">Toutes</button>
        <button class="selection-btn" data-selection="shortlist" style="color:#34d399">⭐ ShortList</button>
        <button class="selection-btn" data-selection="ecartee" style="color:#f87171">✕ Écartées</button>
        <button class="selection-btn" data-selection="invest" style="color:#fbbf24">$ Invest</button>
      </div>
    </div>

    <button class="btn-reset" id="btn-reset">↺ Réinitialiser les filtres</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="result-bar">
      <span><b id="result-count">—</b> annonces</span>
    </div>

    <!-- Galerie -->
    <div id="view-gallery" class="active">
      <div class="gallery-grid" id="gallery-grid">
        <div class="loading"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>

    <!-- Liste -->
    <div id="view-list">
      <table class="list-table">
        <thead>
          <tr>
            <th></th>
            <th>Titre</th>
            <th class="sortable">Prix ↕</th>
            <th class="sortable">Surface ↕</th>
            <th>Ville</th>
            <th>Source</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="list-tbody"></tbody>
      </table>
    </div>

    <!-- Carte -->
    <div id="view-map">
      <div id="map"></div>
    </div>
  </main>
</div>

<!-- ── Lightbox / Slideshow ───────────────────────────────── -->
<div class="lightbox" id="lightbox">
  <div class="lb-header">
    <div class="lb-title" id="lb-title">—</div>
    <div class="lb-counter"><span id="lb-idx">1</span> / <span id="lb-total">1</span></div>
    <div class="lb-controls">
      <button class="lb-btn" id="lb-play">▶ Lecture</button>
      <span style="font-size:11px;color:var(--muted);align-self:center;">Intervalle :</span>
      <select class="lb-btn" id="lb-speed" style="padding:6px 10px;">
        <option value="3000">3s</option>
        <option value="5000" selected>5s</option>
        <option value="8000">8s</option>
        <option value="12000">12s</option>
      </select>
    </div>
    <button class="lb-btn-close" id="lb-close">✕</button>
  </div>
  <div class="lb-progress"><div class="lb-progress-bar" id="lb-progress-bar" style="width:0%"></div></div>
  <div class="lb-body">
    <button class="lb-nav lb-nav-prev" id="lb-prev">‹</button>
    <img class="lb-img" id="lb-img" src="" alt="">
    <button class="lb-nav lb-nav-next" id="lb-next">›</button>
  </div>
  <div class="lb-info">
    <div class="lb-price" id="lb-price">—</div>
    <div class="lb-detail" id="lb-surface">—</div>
    <div class="lb-detail" id="lb-location">—</div>
    <span class="tag tag-invest" id="lb-invest-badge" hidden>$ Invest</span>
    <button class="lb-btn" id="lb-invest" type="button" aria-pressed="false" title="Marquer comme investissement locatif">$ Invest</button>
    <a class="lb-link" id="lb-link" href="#" target="_blank" rel="noopener">Voir l'annonce →</a>
  </div>
</div>

<!-- Modale suppression -->
<div class="delete-modal" id="delete-modal">
  <div class="delete-modal-box">
    <h3>🗑 Supprimer l'annonce</h3>
    <p>Voulez-vous supprimer <span class="delete-modal-name" id="delete-modal-title"></span> de votre galerie ?<br>Cette action est irréversible.</p>
    <div class="delete-modal-actions">
      <button class="btn-modal-cancel" id="delete-modal-cancel">Annuler</button>
      <button class="btn-modal-confirm" id="delete-modal-confirm">Supprimer</button>
    </div>
  </div>
</div>

<script>
  // Theme toggle
  var themeBtn = document.getElementById('btn-theme');
  var currentTheme = localStorage.getItem('immo-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

  themeBtn.addEventListener('click', function() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    localStorage.setItem('immo-theme', currentTheme);
    themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  });

  // Mobile sidebar toggle
  var sidebarEl  = document.querySelector('.sidebar');
  var overlayEl  = document.getElementById('sidebar-overlay');
  var btnFilters = document.getElementById('btn-filters-mobile');

  function openSidebar()  { sidebarEl.classList.add('open');  overlayEl.classList.add('open'); }
  function closeSidebar() { sidebarEl.classList.remove('open'); overlayEl.classList.remove('open'); }

  if (btnFilters) btnFilters.addEventListener('click', openSidebar);
  if (overlayEl)  overlayEl.addEventListener('click', closeSidebar);

  // Fermer après changement de filtre sur mobile
  document.addEventListener('DOMContentLoaded', function() {
    var inputs = document.querySelectorAll('.sidebar input, .sidebar select, .selection-btn, #btn-reset');
    inputs.forEach(function(el) {
      el.addEventListener('change', function() {
        if (window.innerWidth <= 768) closeSidebar();
      });
      el.addEventListener('click', function() {
        if (window.innerWidth <= 768) setTimeout(closeSidebar, 300);
      });
    });
  });
</script>
<script src="app.js"></script>
</body>
</html>
